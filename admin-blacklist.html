<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>運營管理系統 - 每日彩金黑名單管理</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: { DEFAULT: '#0052d9', hover: '#0045b5', light: '#e1ecff' },
            sidebar: { bg: '#1e222d', hover: '#2c3243', active: '#0052d9' }
          }
        }
      }
    };
  </script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap');
    body {
      font-family: 'Noto Sans TC', system-ui, -apple-system, sans-serif;
      background-color: #f5f7fa;
    }
    .menu-active {
      background-color: #0052d9;
      color: #ffffff !important;
    }
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(0, 0, 0, 0.15); border-radius: 3px; }
  </style>
</head>
<body class="text-gray-800 min-h-screen flex selection:bg-primary selection:text-white">

  <!-- LEFT SIDEBAR: Shopline style dark navbar -->
  <aside class="w-64 bg-sidebar-bg text-gray-300 flex-shrink-0 flex flex-col justify-between shadow-lg sticky top-0 h-screen z-20">
    <div>
      <!-- Sidebar Brand Header -->
      <div class="px-6 py-5 border-b border-gray-700/50 flex items-center gap-2.5">
        <div class="w-7 h-7 bg-primary rounded flex items-center justify-center font-bold text-white text-sm">BC</div>
        <div>
          <h2 class="text-sm font-bold text-white tracking-wider">每日彩金系統</h2>
          <p class="text-[9px] text-gray-500 font-mono tracking-tight">OPERATIONS PORTAL</p>
        </div>
      </div>

      <!-- Navigation Menu -->
      <nav class="px-3 py-4 space-y-1 text-xs">
        <!-- Links to daily reward modules locally -->
        <a href="admin-settings.html" class="w-full flex items-center gap-2.5 px-4 py-3 rounded-lg text-gray-400 hover:bg-sidebar-hover hover:text-white transition font-medium">
          <span>💰 每日彩金系統參數</span>
        </a>
        <button onclick="location.reload()" class="menu-active w-full flex items-center gap-2.5 px-4 py-3 rounded-lg text-white font-medium">
          <span>🛡️ 每日彩金黑名單</span>
        </button>
        <a href="admin-reports.html" class="w-full flex items-center gap-2.5 px-4 py-3 rounded-lg text-gray-400 hover:bg-sidebar-hover hover:text-white transition font-medium">
          <span>📊 每日彩金數據報表</span>
        </a>
      </nav>
    </div>

    <!-- Sidebar Footer -->
    <div class="p-4 border-t border-gray-700/50 text-[10px] text-gray-500 space-y-2">
      <div class="bg-gray-800/40 p-2.5 rounded-lg border border-gray-700/30">
        <p class="font-bold text-gray-400">當前操作員</p>
        <p class="text-[11px] text-gray-300 mt-1">營運企劃專員 (Staff02)</p>
      </div>
    </div>
  </aside>

  <!-- RIGHT CONTENT AREA -->
  <div class="flex-1 flex flex-col min-w-0">
    
    <!-- Top Navbar Bar -->
    <header class="bg-white border-b border-gray-200 h-14 flex items-center justify-between px-6 z-10">
      <div class="flex items-center gap-2">
        <span class="text-gray-400 text-xs">當前面板:</span>
        <h2 id="topBarTitle" class="text-xs font-bold text-gray-800">每日彩金黑名單管理</h2>
      </div>

      <!-- Links -->
      <div class="flex items-center gap-3">
        <a href="index.html" target="_blank" class="text-[11px] bg-primary/10 hover:bg-primary/20 text-primary border border-primary/20 font-bold px-3 py-1.5 rounded-full transition">
          開啟前台簽到計劃 ↗
        </a>
      </div>
    </header>

    <!-- Main Content Area -->
    <main class="flex-grow p-6 overflow-y-auto space-y-6">

      <div id="view-daily-blacklist" class="space-y-6">
        
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
          <div class="bg-white rounded-xl border border-gray-200/80 p-5 shadow-sm space-y-3.5 text-xs">
            <h3 class="font-bold text-gray-800 border-b border-gray-100 pb-2 text-sm">單筆新增黑名單</h3>
            <div class="space-y-3">
              <div>
                <label class="block text-gray-500 mb-1 font-medium">會員編號</label>
                <input type="text" id="memberIdInput" placeholder="例如: M005" class="w-full bg-gray-50 border border-gray-200 rounded-lg p-2 text-gray-800 placeholder-gray-400 focus:outline-none focus:border-primary focus:bg-white transition" />
              </div>
              <div>
                <label class="block text-gray-500 mb-1 font-medium">黑名單等級與限制</label>
                <select id="levelSelect" class="w-full bg-gray-50 border border-gray-200 rounded-lg p-2 text-gray-800 focus:outline-none focus:border-primary focus:bg-white transition">
                  <option value="Level 1">Level 1 - 完全禁止領取</option>
                  <option value="Level 2">Level 2 - 最高 D 級</option>
                  <option value="Level 3">Level 3 - 最高 C 級</option>
                  <option value="Level 4">Level 4 - 最高 B 級</option>
                </select>
              </div>
              <div>
                <label class="block text-gray-500 mb-1 font-medium">加入原因</label>
                <input type="text" id="reasonInput" placeholder="輸入封禁原因，例如: 多帳號套利" class="w-full bg-gray-50 border border-gray-200 rounded-lg p-2 text-gray-800 placeholder-gray-400 focus:outline-none focus:border-primary focus:bg-white transition" />
              </div>
              <button id="addBtn" class="px-4 py-2.5 bg-primary text-white font-bold rounded-lg hover:bg-primary-hover transition">新增黑名單</button>
            </div>
          </div>

          <div class="bg-white rounded-xl border border-gray-200/80 p-5 shadow-sm space-y-3.5 text-xs">
            <h3 class="font-bold text-gray-800 border-b border-gray-100 pb-2 text-sm">CSV 批量導入</h3>
            <p class="text-xs text-gray-500">格式範例：會員編號, 等級數字 (1~4), 原因</p>
            <div class="bg-gray-50 p-3 rounded-lg border border-gray-200/60 font-mono text-[10px] text-gray-500 leading-relaxed">
              M201,2,異常行為<br/>M202,3,多帳號關聯
            </div>
            <input type="file" id="csvFileInput" accept=".csv" class="block w-full text-xs file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-xs file:font-bold file:bg-primary/10 file:text-primary hover:file:bg-primary/20 cursor-pointer" />
          </div>
        </div>

        <div class="bg-white rounded-xl border border-gray-200/80 p-5 shadow-sm space-y-4">
          <div class="flex flex-wrap gap-3 items-center text-xs">
            <input type="text" id="searchInput" placeholder="搜尋會員編號或原因..." class="bg-gray-50 border border-gray-200 rounded-lg px-3 py-2 flex-grow focus:outline-none focus:border-primary focus:bg-white text-gray-800" />
            <select id="filterLevelSelect" class="bg-gray-50 border border-gray-200 rounded-lg px-3 py-2 focus:outline-none text-gray-800">
              <option value="全部">全部等級</option>
              <option value="Level 1">Level 1</option>
              <option value="Level 2">Level 2</option>
              <option value="Level 3">Level 3</option>
              <option value="Level 4">Level 4</option>
            </select>
          </div>
          
          <div class="overflow-x-auto">
            <table class="w-full text-xs text-left">
              <thead>
                <tr class="bg-gray-50 border-b border-gray-200 text-gray-500">
                  <th class="px-3 py-2.5 font-bold">會員編號</th>
                  <th class="px-3 py-2.5 font-bold">封禁等級</th>
                  <th class="px-3 py-2.5 font-bold">原因說明</th>
                  <th class="px-3 py-2.5 font-bold">加入時間</th>
                  <th class="px-3 py-2.5 text-right pr-6 font-bold">操作</th>
                </tr>
              </thead>
              <tbody id="blacklistTableBody" class="divide-y divide-gray-100 text-gray-600">
                <!-- Loaded dynamically -->
              </tbody>
            </table>
          </div>
        </div>

        <div class="bg-white rounded-xl border border-gray-200/80 p-5 shadow-sm space-y-3">
          <h3 class="font-bold text-gray-800 border-b border-gray-100 pb-2 text-xs">操作審計歷史紀錄</h3>
          <div id="historyList" class="space-y-2 text-xs text-gray-600">
            <!-- Loaded dynamically -->
          </div>
        </div>

      </div>

    </main>
  </div>

  <script>
    // ═══ Blacklist Database Logic ═══
    let blacklistData = [
      { id: 'M101', level: 'Level 1', reason: '異常套利行為', date: '2026/06/26' },
      { id: 'M102', level: 'Level 2', reason: '多帳號操作', date: '2026/06/28' },
      { id: 'M103', level: 'Level 3', reason: '違規投注模式', date: '2026/07/01' },
      { id: 'M104', level: 'Level 4', reason: '風控觀察中', date: '2026/07/03' },
      { id: 'M105', level: 'Level 2', reason: '異常提款頻率', date: '2026/07/05' },
      { id: 'M003', level: 'Level 3', reason: '測試用黑名單（白努力）', date: '2026/07/06' }
    ];

    let historyData = [
      { type: '新增', content: '新增黑名單 Level 1：異常套利行為', date: '2026/06/26' },
      { type: '批量新增', content: 'CSV 批量新增 3 筆黑名單', date: '2026/07/01' },
      { type: '新增', content: '新增黑名單 Level 3：測試用黑名單', date: '2026/07/06' }
    ];

    const tableBody = document.getElementById('blacklistTableBody');
    const historyList = document.getElementById('historyList');
    const searchInput = document.getElementById('searchInput');
    const filterLevelSelect = document.getElementById('filterLevelSelect');

    function getTodayString() {
      const d = new Date();
      return `${d.getFullYear()}/${String(d.getMonth() + 1).padStart(2, '0')}/${String(d.getDate()).padStart(2, '0')}`;
    }

    function renderTable() {
      const q = searchInput.value.toLowerCase().trim();
      const filterLvl = filterLevelSelect.value;

      const filtered = blacklistData.filter(item => {
        const matchesSearch = item.id.toLowerCase().includes(q) || item.reason.toLowerCase().includes(q);
        const matchesLevel = filterLvl === '全部' || item.level === filterLvl;
        return matchesSearch && matchesLevel;
      });

      tableBody.innerHTML = '';
      if (filtered.length === 0) {
        tableBody.innerHTML = `
          <tr>
            <td colspan="5" class="px-3 py-8 text-center text-gray-400">查無符合條件的黑名單資料</td>
          </tr>
        `;
        return;
      }

      filtered.forEach(item => {
        const tr = document.createElement('tr');
        tr.className = 'border-t border-gray-100 hover:bg-gray-50/80 transition-colors';
        
        let badgeColorClass = '';
        if (item.level === 'Level 1') badgeColorClass = 'bg-red-100 text-red-800';
        else if (item.level === 'Level 2') badgeColorClass = 'bg-orange-100 text-orange-800';
        else if (item.level === 'Level 3') badgeColorClass = 'bg-yellow-100 text-yellow-800';
        else badgeColorClass = 'bg-blue-100 text-blue-800';

        tr.innerHTML = `
          <td class="px-3 py-3 font-mono font-medium">${item.id}</td>
          <td class="px-3 py-3">
            <span class="px-2 py-0.5 rounded text-xs font-semibold ${badgeColorClass}">${item.level}</span>
          </td>
          <td class="px-3 py-3 text-gray-600">${item.reason}</td>
          <td class="px-3 py-3 text-gray-500 font-mono text-xs">${item.date}</td>
          <td class="px-3 py-3 text-right pr-6">
            <button onclick="removeUser('${item.id}')" class="text-red-600 hover:text-red-900 font-medium transition-colors">移除</button>
          </td>
        `;
        tableBody.appendChild(tr);
      });
    }

    function renderHistory() {
      historyList.innerHTML = '';
      historyData.slice().reverse().forEach(item => {
        const div = document.createElement('div');
        div.className = 'flex justify-between border-b border-gray-100 pb-2 items-center';
        
        let typeBadge = '';
        if (item.type === '新增') typeBadge = '<span class="bg-green-100 text-green-700 px-2 py-0.5 rounded text-xs mr-2">新增</span>';
        else if (item.type === '批量新增') typeBadge = '<span class="bg-blue-100 text-blue-700 px-2 py-0.5 rounded text-xs mr-2">批量新增</span>';
        else if (item.type === '移除') typeBadge = '<span class="bg-red-100 text-red-700 px-2 py-0.5 rounded text-xs mr-2">移除</span>';

        div.innerHTML = `
          <div class="flex items-center">
            ${typeBadge}
            <span class="text-gray-700">${item.content}</span>
          </div>
          <span class="text-gray-400 text-xs font-mono">${item.date}</span>
        `;
        historyList.appendChild(div);
      });
    }

    window.removeUser = function(id) {
      const idx = blacklistData.findIndex(item => item.id === id);
      if (idx !== -1) {
        const deleted = blacklistData[idx];
        blacklistData.splice(idx, 1);
        
        historyData.push({
          type: '移除',
          content: `移除黑名單：會員 ${deleted.id}（${deleted.level}）`,
          date: getTodayString()
        });

        renderTable();
        renderHistory();
      }
    };

    document.getElementById('addBtn').addEventListener('click', () => {
      const mIdEl = document.getElementById('memberIdInput');
      const lvlEl = document.getElementById('levelSelect');
      const rsnEl = document.getElementById('reasonInput');

      const id = mIdEl.value.trim().toUpperCase();
      const level = lvlEl.value;
      const reason = rsnEl.value.trim();

      if (!id || !reason) {
        alert('請輸入會員編號與原因！');
        return;
      }

      if (blacklistData.some(item => item.id === id)) {
        alert('此會員已在黑名單列表中！');
        return;
      }

      const today = getTodayString();
      blacklistData.push({ id, level, reason, date: today });
      
      historyData.push({
        type: '新增',
        content: `新增黑名單 ${level}：${reason} (${id})`,
        date: today
      });

      mIdEl.value = '';
      rsnEl.value = '';

      renderTable();
      renderHistory();
    });

    document.getElementById('csvFileInput').addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = function(evt) {
        const text = evt.target.result;
        const lines = text.split(/\r?\n/);
        let count = 0;
        const today = getTodayString();

        lines.forEach(line => {
          if (!line.trim()) return;
          const columns = line.split(',');
          if (columns.length >= 2) {
            const memberId = columns[0].trim().toUpperCase();
            let levelNum = columns[1].trim();
            const reason = columns[2] ? columns[2].trim() : '無原因';

            if (memberId === '會員編號' || memberId === 'MEMBER_ID' || memberId === 'ID') return;

            let levelString = levelNum;
            if (/^\d+$/.test(levelNum)) {
              levelString = 'Level ' + levelNum;
            }

            const exists = blacklistData.some(item => item.id === memberId);
            if (!exists && memberId) {
              blacklistData.push({
                id: memberId,
                level: levelString,
                reason: reason,
                date: today
              });
              count++;
            }
          }
        });

        if (count > 0) {
          historyData.push({
            type: '批量新增',
            content: `CSV 批量新增 ${count} 筆黑名單`,
            date: today
          });
          renderTable();
          renderHistory();
          alert(`成功批量上傳 ${count} 筆黑名單！`);
        } else {
          alert('未能成功匯入任何資料（格式不正確或資料已重複）。');
        }

        e.target.value = '';
      };

      reader.readAsText(file);
    });

    searchInput.addEventListener('input', renderTable);
    filterLevelSelect.addEventListener('change', renderTable);

    // Boot initialize
    renderTable();
    renderHistory();
  </script>
</body>
</html>
