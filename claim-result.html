<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>領獎成功 - 餘額每日彩金計劃</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { theme: { extend: { colors: { gold: { DEFAULT:'#d4a853', light:'#f5e6b8' }, surface: { DEFAULT:'#0d1117', card:'#161b22', border:'#2d3548' } } } } };
  </script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700&display=swap');
    body { font-family: 'Noto Sans TC', system-ui, sans-serif; }
    .gold-text { background: linear-gradient(135deg,#f5e6b8,#d4a853,#a67c2e); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
    .card-glass { background: linear-gradient(145deg,rgba(28,35,51,.95),rgba(22,27,34,.98)); border:1px solid rgba(212,168,83,.15); }
    .btn-gold { background: linear-gradient(135deg,#e8c96a,#d4a853,#a67c2e); box-shadow:0 4px 20px rgba(212,168,83,.35); }
  </style>
</head>
<body class="bg-surface text-gray-100 min-h-screen flex flex-col items-center justify-center px-4">
  <div class="card-glass rounded-2xl p-8 max-w-md w-full text-center">
    <div class="w-16 h-16 rounded-full bg-emerald-500/10 border border-emerald-500/30 flex items-center justify-center mx-auto mb-5">
      <svg class="w-8 h-8 text-emerald-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
    </div>
    <h1 class="text-2xl font-bold mb-1">領獎成功</h1>
    <p class="text-gray-500 text-sm mb-6">2026/07/06 18:30</p>
    <div class="bg-gold/5 border border-gold/20 rounded-xl p-6 mb-6">
      <p class="text-gray-500 text-xs mb-1">本次獲得彩金</p>
      <p class="text-4xl font-bold gold-text">$79.75</p>
      <p class="text-gold/70 text-sm mt-1">S 級彩金</p>
    </div>
    <div class="text-left space-y-3 mb-6 text-sm">
      <div class="flex justify-between"><span class="text-gray-500">流水倍數</span><span>2x</span></div>
      <div class="flex justify-between"><span class="text-gray-500">需完成流水</span><span>$159.50</span></div>
      <div class="flex justify-between"><span class="text-gray-500">已完成</span><span class="text-gray-400">$0.00</span></div>
      <div class="h-1.5 bg-surface-border rounded-full"><div class="h-full bg-gold/60 rounded-full" style="width:0%"></div></div>
      <p class="text-xs text-gray-600 text-center">完成 2x 流水後方可提領</p>
    </div>
    <a href="index.html" class="btn-gold inline-block text-surface font-semibold px-8 py-3 rounded-xl text-sm">返回活動頁</a>
  </div>

  <script>
    // 禁用滑鼠右鍵
    document.addEventListener('contextmenu', function (e) {
      e.preventDefault();
    });

    // 禁用 F12 與開發者工具快捷鍵
    document.addEventListener('keydown', function (e) {
      if (e.key === 'F12') {
        e.preventDefault();
      }
      if (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'i')) {
        e.preventDefault();
      }
      if (e.ctrlKey && e.shiftKey && (e.key === 'C' || e.key === 'c')) {
        e.preventDefault();
      }
      if (e.ctrlKey && e.shiftKey && (e.key === 'J' || e.key === 'j')) {
        e.preventDefault();
      }
      if (e.ctrlKey && (e.key === 'U' || e.key === 'u')) {
        e.preventDefault();
      }
      if (e.ctrlKey && (e.key === 'S' || e.key === 's')) {
        e.preventDefault();
      }
    });
  </script>
</body>
</html>
