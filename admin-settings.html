<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>運營管理系統 - 每日彩金系統參數</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: { DEFAULT: '#0052d9', hover: '#0045b5', light: '#e1ecff' },
            sidebar: { bg: '#1e222d', hover: '#2c3243', active: '#0052d9' }
          }
        }
      }
    };
  </script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap');
    body {
      font-family: 'Noto Sans TC', system-ui, -apple-system, sans-serif;
      background-color: #f5f7fa;
    }
    .menu-active {
      background-color: #0052d9;
      color: #ffffff !important;
    }
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(0, 0, 0, 0.15); border-radius: 3px; }
  </style>
</head>
<body class="text-gray-800 min-h-screen flex selection:bg-primary selection:text-white">

  <!-- LEFT SIDEBAR: Shopline style dark navbar -->
  <aside class="w-64 bg-sidebar-bg text-gray-300 flex-shrink-0 flex flex-col justify-between shadow-lg sticky top-0 h-screen z-20">
    <div>
      <!-- Sidebar Brand Header -->
      <div class="px-6 py-5 border-b border-gray-700/50 flex items-center gap-2.5">
        <div class="w-7 h-7 bg-primary rounded flex items-center justify-center font-bold text-white text-sm">BC</div>
        <div>
          <h2 class="text-sm font-bold text-white tracking-wider">每日彩金系統</h2>
          <p class="text-[9px] text-gray-500 font-mono tracking-tight">OPERATIONS PORTAL</p>
        </div>
      </div>

      <!-- Navigation Menu -->
      <nav class="px-3 py-4 space-y-1 text-xs">
        <!-- Links to daily reward modules locally -->
        <button onclick="location.reload()" class="menu-active w-full flex items-center gap-2.5 px-4 py-3 rounded-lg text-white font-medium">
          <span>💰 每日彩金系統參數</span>
        </button>
        <a href="admin-blacklist.html" class="w-full flex items-center gap-2.5 px-4 py-3 rounded-lg text-gray-400 hover:bg-sidebar-hover hover:text-white transition font-medium">
          <span>🛡️ 每日彩金黑名單</span>
        </a>
        <a href="admin-reports.html" class="w-full flex items-center gap-2.5 px-4 py-3 rounded-lg text-gray-400 hover:bg-sidebar-hover hover:text-white transition font-medium">
          <span>📊 每日彩金數據報表</span>
        </a>
      </nav>
    </div>

    <!-- Sidebar Footer -->
    <div class="p-4 border-t border-gray-700/50 text-[10px] text-gray-500 space-y-2">
      <div class="bg-gray-800/40 p-2.5 rounded-lg border border-gray-700/30">
        <p class="font-bold text-gray-400">當前操作員</p>
        <p class="text-[11px] text-gray-300 mt-1">營運企劃專員 (Staff02)</p>
      </div>
    </div>
  </aside>

  <!-- RIGHT CONTENT AREA -->
  <div class="flex-1 flex flex-col min-w-0">
    
    <!-- Top Navbar Bar -->
    <header class="bg-white border-b border-gray-200 h-14 flex items-center justify-between px-6 z-10">
      <div class="flex items-center gap-2">
        <span class="text-gray-400 text-xs">當前面板:</span>
        <h2 id="topBarTitle" class="text-xs font-bold text-gray-800">每日彩金系統參數設定</h2>
      </div>

      <!-- Links -->
      <div class="flex items-center gap-3">
        <a href="index.html" target="_blank" class="text-[11px] bg-primary/10 hover:bg-primary/20 text-primary border border-primary/20 font-bold px-3 py-1.5 rounded-full transition">
          開啟前台簽到計劃 ↗
        </a>
      </div>
    </header>

    <!-- Main Content Area -->
    <main class="flex-grow p-6 overflow-y-auto space-y-6">

      <div id="view-daily-settings" class="space-y-6 max-w-4xl">
        <div class="bg-white rounded-xl border border-gray-200/80 shadow-sm p-6 space-y-6 text-xs">
          
          <div>
            <h3 class="font-bold text-gray-800 border-b border-gray-100 pb-2 text-sm flex items-center gap-1">
              <span>🕒</span><span>結算時間設定</span>
            </h3>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mt-3">
              <div>
                <label class="block text-gray-500 mb-1 font-medium">首次結算時間</label>
                <input type="time" value="00:00" class="w-full bg-gray-50 border border-gray-200 rounded-lg p-2 text-gray-800 focus:outline-none focus:border-primary focus:bg-white transition" />
              </div>
              <div>
                <label class="block text-gray-500 mb-1 font-medium">每日結算次數</label>
                <select class="w-full bg-gray-50 border border-gray-200 rounded-lg p-2 text-gray-800 focus:outline-none focus:border-primary focus:bg-white transition">
                  <option selected>4 次（每 6 小時）</option>
                  <option>1 次（每 24 小時）</option>
                  <option>2 次（每 12 小時）</option>
                  <option>6 次（每 4 小時）</option>
                  <option>8 次（每 3 小時）</option>
                  <option>12 次（每 2 小時）</option>
                  <option>24 次（每 1 小時）</option>
                </select>
                <p class="text-[10px] text-gray-400 mt-1">系統自動將 24 小時平均切分為 4 個時段，每段 6 小時</p>
              </div>
            </div>
          </div>

          <div>
            <h3 class="font-bold text-gray-800 border-b border-gray-100 pb-2 text-sm flex items-center gap-1">
              <span>📈</span><span>各等級彩金百分比（每日 %）</span>
            </h3>
            <div class="grid grid-cols-2 md:grid-cols-5 gap-4 mt-3">
              <div>
                <label class="block text-gray-500 mb-1 font-medium">S 級</label>
                <input type="number" value="0.055" step="0.001" class="w-full bg-gray-50 border border-gray-200 rounded-lg p-2 text-gray-800 focus:outline-none focus:border-primary focus:bg-white transition" />
              </div>
              <div>
                <label class="block text-gray-500 mb-1 font-medium">A 級</label>
                <input type="number" value="0.050" step="0.001" class="w-full bg-gray-50 border border-gray-200 rounded-lg p-2 text-gray-800 focus:outline-none focus:border-primary focus:bg-white transition" />
              </div>
              <div>
                <label class="block text-gray-500 mb-1 font-medium">B 級</label>
                <input type="number" value="0.045" step="0.001" class="w-full bg-gray-50 border border-gray-200 rounded-lg p-2 text-gray-800 focus:outline-none focus:border-primary focus:bg-white transition" />
              </div>
              <div>
                <label class="block text-gray-500 mb-1 font-medium">C 級</label>
                <input type="number" value="0.040" step="0.001" class="w-full bg-gray-50 border border-gray-200 rounded-lg p-2 text-gray-800 focus:outline-none focus:border-primary focus:bg-white transition" />
              </div>
              <div>
                <label class="block text-gray-500 mb-1 font-medium">D 級</label>
                <input type="number" value="0.035" step="0.001" class="w-full bg-gray-50 border border-gray-200 rounded-lg p-2 text-gray-800 focus:outline-none focus:border-primary focus:bg-white transition" />
              </div>
            </div>
          </div>

          <div>
            <h3 class="font-bold text-gray-800 border-b border-gray-100 pb-2 text-sm flex items-center gap-1">
              <span>💰</span><span>彩金提款流水設定</span>
            </h3>
            <div class="max-w-sm mt-3">
              <label class="block text-gray-500 mb-1 font-medium">流水倍數（全等級共用）</label>
              <input type="number" value="2" class="w-full bg-gray-50 border border-gray-200 rounded-lg p-2 text-gray-800 focus:outline-none focus:border-primary focus:bg-white transition" />
              <p class="text-[10px] text-gray-400 mt-1">所有等級統一使用此倍率</p>
            </div>
          </div>

          <div>
            <h3 class="font-bold text-gray-800 border-b border-gray-100 pb-2 text-sm flex items-center gap-1">
              <span>⚙️</span><span>其他參數設定</span>
            </h3>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mt-3">
              <div>
                <label class="block text-gray-500 mb-1 font-medium">新入金需停留小時數</label>
                <input type="number" value="24" class="w-full bg-gray-50 border border-gray-200 rounded-lg p-2 text-gray-800 focus:outline-none focus:border-primary focus:bg-white transition" />
              </div>
              <div>
                <label class="block text-gray-500 mb-1 font-medium">未結算注單最低賠率門檻</label>
                <input type="number" value="1.80" step="0.01" class="w-full bg-gray-50 border border-gray-200 rounded-lg p-2 text-gray-800 focus:outline-none focus:border-primary focus:bg-white transition" />
              </div>
              <div class="flex items-center gap-2 mt-2 col-span-2">
                <input type="checkbox" id="realtime" checked class="w-4 h-4 rounded text-primary focus:ring-0 border-gray-300" />
                <label for="realtime" class="text-gray-700 font-medium cursor-pointer">開啟「即時利息預估顯示」功能</label>
              </div>
            </div>
          </div>

          <div class="pt-4 border-t border-gray-100 flex gap-2">
            <button onclick="alert('儲存成功！參數已更新')" class="px-5 py-2.5 bg-primary text-white font-bold rounded-lg hover:bg-primary-hover transition">
              儲存設定
            </button>
          </div>

        </div>
      </div>

    </main>
  </div>

</body>
</html>
